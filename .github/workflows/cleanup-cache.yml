name: Cleanup Caches

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'YES' to confirm cache cleanup"
        required: true
        default: 'NO'

permissions:
  actions: write
  contents: read
  packages: read

jobs:
  cleanup:
    if: ${{ github.event.inputs.confirm == 'YES' }}
    runs-on: ubuntu-latest
    steps:
      - name: List current Actions caches (before)
        uses: actions/github-script@v7
        id: list_before
        with:
          script: |
            const caches = await github.rest.actions.getActionsCacheList({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            core.info(`Found ${caches.data.total_count} caches`);
            return caches.data.actions_caches.map(c=>({id:c.id,key:c.key,size_in_mb:(c.size_in_bytes/1024/1024).toFixed(2)}));

      - name: Delete all Actions caches
        uses: actions/github-script@v7
        with:
          script: |
            const caches = await github.rest.actions.getActionsCacheList({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            let deleted = 0;
            for (const c of caches.data.actions_caches) {
              try {
                await github.rest.actions.deleteActionsCacheById({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  cache_id: c.id
                });
                deleted++;
                core.info(`Deleted cache id=${c.id} key=${c.key}`);
              } catch (e) {
                core.warning(`Failed to delete cache ${c.id}: ${e.message}`);
              }
            }
            core.setOutput('deleted', deleted);

      - name: Summary
        run: |
          echo "Deleted ${{ steps.list_before.outputs.result && fromJson(steps.list_before.outputs.result).length || 0 }} caches (requested)." || true

  skip:
    if: ${{ github.event.inputs.confirm != 'YES' }}
    runs-on: ubuntu-latest
    steps:
      - run: echo "Confirmation not provided (expected YES). Skipping cleanup."
